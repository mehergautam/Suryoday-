<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RISE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0F17;
    --surface:#161B22;
    --surface-2:#1D2330;
    --accent:#FFB000;
    --accent-soft:rgba(255,176,0,0.14);
    --text:#FFFFFF;
    --text-dim:#94A3B8;
    --hairline:rgba(255,255,255,0.07);

    /* environment stops — interpolated via JS */
    --env-top:#0B0F17;
    --env-bottom:#0B0F17;
    --env-glow:rgba(255,176,0,0.0);
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  html,body{
    height:100%;
    background:#05070C;
    font-family:'Inter', -apple-system, sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
  }

  .display{ position:relative; }

  .stage-label{
    position:absolute;
    top:-34px; left:0;
    font-family:'Space Grotesk', sans-serif;
    font-size:11px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:#3A4252;
  }

  /* ===== Phone frame ===== */
  .phone{
    width:390px;
    height:844px;
    border-radius:54px;
    background: linear-gradient(180deg, var(--env-top) 0%, var(--bg) 42%, var(--env-bottom) 100%);
    position:relative;
    overflow:hidden;
    box-shadow:
      0 0 0 10px #000,
      0 0 0 11px #232734,
      0 40px 90px -20px rgba(0,0,0,0.8),
      0 0 120px -40px var(--env-glow);
    transition: background 2.4s ease, box-shadow 2.4s ease;
  }

  .notch{
    position:absolute;
    top:14px; left:50%;
    transform:translateX(-50%);
    width:120px; height:28px;
    background:#000;
    border-radius:20px;
    z-index:50;
  }

  .statusbar{
    position:absolute;
    top:18px; left:32px; right:32px;
    display:flex;
    justify-content:space-between;
    font-family:'Space Grotesk', sans-serif;
    font-size:13px;
    font-weight:600;
    color:var(--text);
    z-index:40;
    letter-spacing:0.02em;
  }

  /* ===== Particles ===== */
  .particles{
    position:absolute; inset:0;
    overflow:hidden;
    pointer-events:none;
    z-index:1;
  }
  .particle{
    position:absolute;
    width:3px; height:3px;
    border-radius:50%;
    background:var(--accent);
    opacity:0;
    filter:blur(0.3px);
    animation:drift linear infinite;
  }
  @keyframes drift{
    0%{ transform:translateY(0) translateX(0); opacity:0;}
    10%{opacity:.55;}
    90%{opacity:.35;}
    100%{ transform:translateY(-760px) translateX(var(--dx,20px)); opacity:0;}
  }

  /* horizon glow disc, low on the workout screen to suggest a rising sun */
  .horizon{
    position:absolute;
    bottom:-260px; left:50%;
    transform:translateX(-50%);
    width:520px; height:520px;
    border-radius:50%;
    background: radial-gradient(circle at center, var(--env-glow), transparent 70%);
    z-index:1;
    transition: opacity 2.4s ease, transform 2.4s ease;
    opacity:var(--horizon-opacity, 0);
  }

  /* ===== Screens ===== */
  .screen{
    position:absolute; inset:0;
    padding:76px 26px 0;
    z-index:10;
    opacity:0;
    transform:translateY(14px);
    pointer-events:none;
    transition: opacity .6s cubic-bezier(.4,0,.2,1), transform .6s cubic-bezier(.4,0,.2,1);
  }
  .screen.active{ opacity:1; transform:translateY(0); pointer-events:auto; }

  /* ---- Home screen ---- */
  .eyebrow{
    font-size:14px;
    color:var(--text-dim);
    font-weight:500;
    letter-spacing:0.01em;
  }
  .wordmark{
    font-family:'Space Grotesk', sans-serif;
    font-size:52px;
    font-weight:700;
    letter-spacing:-0.02em;
    line-height:1;
    margin-top:6px;
    background:linear-gradient(180deg, #FFFFFF 0%, #C9CDD6 100%);
    -webkit-background-clip:text;
    background-clip:text;
    -webkit-text-fill-color:transparent;
  }

  .challenge-card{
    margin-top:34px;
    background:linear-gradient(155deg, rgba(255,255,255,0.045), rgba(255,255,255,0.01));
    border:1px solid var(--hairline);
    border-radius:24px;
    padding:22px 22px 24px;
    backdrop-filter: blur(18px);
    position:relative;
    overflow:hidden;
  }
  .challenge-card::after{
    content:"";
    position:absolute;
    top:-40%; right:-20%;
    width:180px; height:180px;
    background:radial-gradient(circle, var(--accent-soft), transparent 70%);
    pointer-events:none;
  }
  .challenge-label{
    font-size:12px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--text-dim);
    font-weight:600;
  }
  .challenge-value{
    font-family:'Space Grotesk', sans-serif;
    font-size:30px;
    font-weight:600;
    margin-top:8px;
    letter-spacing:-0.01em;
  }
  .challenge-value span{ color:var(--accent); }

  .stat-row{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
    margin-top:22px;
  }
  .stat{
    background:rgba(255,255,255,0.03);
    border:1px solid var(--hairline);
    border-radius:18px;
    padding:16px 14px;
  }
  .stat-icon{ opacity:.85; margin-bottom:10px; }
  .stat-label{
    font-size:10.5px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--text-dim);
    font-weight:600;
  }
  .stat-value{
    font-family:'Space Grotesk', sans-serif;
    font-size:20px;
    font-weight:600;
    margin-top:6px;
  }
  .stat-value.accent{ color:var(--accent); }

  .start-btn{
    margin-top:38px;
    width:100%;
    padding:20px;
    border-radius:20px;
    border:none;
    background:linear-gradient(180deg, #FFC93C, var(--accent));
    color:#0B0F17;
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:16px;
    letter-spacing:0.01em;
    display:flex; align-items:center; justify-content:center; gap:10px;
    cursor:pointer;
    box-shadow: 0 18px 40px -14px rgba(255,176,0,0.55);
    transition: transform .25s ease, box-shadow .25s ease;
  }
  .start-btn:active{ transform:scale(0.97); box-shadow:0 8px 22px -10px rgba(255,176,0,0.5); }

  .hint{
    text-align:center;
    margin-top:16px;
    font-size:12px;
    color:#4C5567;
    letter-spacing:0.02em;
  }

  /* ---- Workout screen ---- */
  .workout-top{
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:6px;
  }
  .close-dot{
    width:34px; height:34px;
    border-radius:50%;
    background:rgba(255,255,255,0.06);
    border:1px solid var(--hairline);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .env-name{
    font-size:11px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--text-dim);
    font-weight:600;
    transition:color 1s ease;
  }

  .ring-wrap{
    margin:26px auto 0;
    width:264px; height:264px;
    position:relative;
  }
  .ring-wrap svg{ transform:rotate(-90deg); }
  .ring-track{ fill:none; stroke:rgba(255,255,255,0.07); stroke-width:10; }
  .ring-progress{
    fill:none;
    stroke:url(#ringGrad);
    stroke-width:10;
    stroke-linecap:round;
    transition: stroke-dashoffset 1s linear;
    filter:drop-shadow(0 0 10px rgba(255,176,0,0.45));
  }
  .ring-center{
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
  }
  .ring-time{
    font-family:'Space Grotesk', sans-serif;
    font-size:46px;
    font-weight:700;
    letter-spacing:-0.02em;
    font-variant-numeric:tabular-nums;
  }
  .ring-sub{
    font-size:11px;
    color:var(--text-dim);
    letter-spacing:0.1em;
    text-transform:uppercase;
    margin-top:4px;
    font-weight:600;
  }

  .pose-stage{
    margin-top:14px;
    height:178px;
    display:flex; align-items:center; justify-content:center;
    position:relative;
  }
  .pose-stage svg{
    height:170px;
    filter:drop-shadow(0 8px 24px rgba(0,0,0,0.5));
    transition:opacity .5s ease;
  }

  .pose-info{
    text-align:center;
    margin-top:6px;
  }
  .pose-name{
    font-family:'Space Grotesk', sans-serif;
    font-size:22px;
    font-weight:600;
    letter-spacing:-0.01em;
  }
  .pose-step{
    font-size:12.5px;
    color:var(--text-dim);
    margin-top:5px;
    letter-spacing:0.02em;
  }

  .progress-line{
    margin-top:22px;
    height:3px;
    border-radius:3px;
    background:rgba(255,255,255,0.08);
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg, var(--accent), #FFD27A);
    border-radius:3px;
    transition:width .6s cubic-bezier(.4,0,.2,1);
  }
  .progress-caption{
    display:flex; justify-content:space-between;
    margin-top:9px;
    font-size:11px;
    color:#4C5567;
    letter-spacing:0.04em;
  }

  .controls{
    margin-top:26px;
    display:flex; align-items:center; justify-content:center;
    gap:22px;
  }
  .ctrl{
    width:52px; height:52px;
    border-radius:50%;
    border:1px solid var(--hairline);
    background:rgba(255,255,255,0.03);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    transition:background .2s ease, transform .2s ease;
  }
  .ctrl:active{ transform:scale(0.93); }
  .ctrl.primary{
    width:66px; height:66px;
    background:var(--accent);
    box-shadow:0 14px 30px -10px rgba(255,176,0,0.6);
  }

  .home-indicator{
    position:absolute;
    bottom:9px; left:50%; transform:translateX(-50%);
    width:134px; height:5px;
    border-radius:4px;
    background:rgba(255,255,255,0.35);
    z-index:60;
  }
</style>
</head>
<body>

<div class="display">
  <div class="stage-label">RISE — interactive design prototype</div>
  <div class="phone" id="phone">
    <div class="notch"></div>
    <div class="statusbar"><span>9:41</span><span>●●●●&nbsp; 5G &nbsp;100%</span></div>

    <div class="particles" id="particles"></div>
    <div class="horizon" id="horizon"></div>

    <!-- HOME SCREEN -->
    <div class="screen active" id="home">
      <div class="eyebrow">Good Morning</div>
      <div class="wordmark">RISE</div>

      <div class="challenge-card">
        <div class="challenge-label">Today's Challenge</div>
        <div class="challenge-value">12 <span>Surya Namaskar</span></div>

        <div class="stat-row">
          <div class="stat">
            <svg class="stat-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 2C12 2 6 9 6 14a6 6 0 0012 0c0-5-6-12-6-12z" stroke="#FFB000" stroke-width="1.6" stroke-linejoin="round"/></svg>
            <div class="stat-label">Streak</div>
            <div class="stat-value accent">7 days</div>
          </div>
          <div class="stat">
            <svg class="stat-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="8.5" stroke="#94A3B8" stroke-width="1.6"/><path d="M12 7v5l3.2 2" stroke="#94A3B8" stroke-width="1.6" stroke-linecap="round"/></svg>
            <div class="stat-label">Duration</div>
            <div class="stat-value">9 min</div>
          </div>
          <div class="stat">
            <svg class="stat-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M13 2 4 14h6l-1 8 9-12h-6l1-8z" stroke="#FFB000" stroke-width="1.6" stroke-linejoin="round"/></svg>
            <div class="stat-label">Energy</div>
            <div class="stat-value accent">82</div>
          </div>
        </div>
      </div>

      <button class="start-btn" onclick="startSession()">
        Start Session
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#0B0F17" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="hint">A quiet nine minutes, before the day begins</div>
    </div>

    <!-- WORKOUT SCREEN -->
    <div class="screen" id="workout">
      <div class="workout-top">
        <div class="close-dot" onclick="endSession()">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="#94A3B8" stroke-width="2" stroke-linecap="round"/></svg>
        </div>
        <div class="env-name" id="envName">Night</div>
        <div style="width:34px"></div>
      </div>

      <div class="ring-wrap">
        <svg width="264" height="264" viewBox="0 0 264 264">
          <defs>
            <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#FFD27A"/>
              <stop offset="100%" stop-color="#FFB000"/>
            </linearGradient>
          </defs>
          <circle class="ring-track" cx="132" cy="132" r="118"/>
          <circle class="ring-progress" id="ringProgress" cx="132" cy="132" r="118"
            stroke-dasharray="741.4" stroke-dashoffset="741.4"/>
        </svg>
        <div class="ring-center">
          <div class="ring-time" id="ringTime">0:04</div>
          <div class="ring-sub" id="ringSub">Round 1 of 3</div>
        </div>
      </div>

      <div class="pose-stage" id="poseStage"></div>

      <div class="pose-info">
        <div class="pose-name" id="poseName">Pranamasana</div>
        <div class="pose-step" id="poseStep">Step 1 of 12 · Prayer Pose</div>
      </div>

      <div class="progress-line"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-caption"><span>Overall Progress</span><span id="progressPct">0%</span></div>

      <div class="controls">
        <div class="ctrl" onclick="skipPose(-1)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="ctrl primary" id="playPause" onclick="togglePause()">
          <svg id="playIcon" width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="6" y="5" width="4" height="14" rx="1" fill="#0B0F17"/><rect x="14" y="5" width="4" height="14" rx="1" fill="#0B0F17"/></svg>
        </div>
        <div class="ctrl" onclick="skipPose(1)">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>
    </div>

    <div class="home-indicator"></div>
  </div>
</div>

<script>
/* ============ Pose silhouettes (monochrome vector, stroke-based) ============ */
const poseSVGs = {
  pranamasana: `<svg viewBox="0 0 100 170" xmlns="http://www.w3.org/2000/svg">
    <g fill="none" stroke="#EDEFF3" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">

      <path d="M108 32 C 96 26, 88 22, 80 12"/>

  ashtanga: `<svg viewBox="0 0 170 90" xmlns="http://www.w3.org/2000/svg">

  bhujangasana: `<svg viewBox="0 0 170 100" xmlns="http://www.w3.org/2000/svg">
    <g fill="none" stroke="#EDEFF3" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="150" cy="34" r="8" stroke="#FFB000"/>
      <path d="M144 40 C 110 46, 60 56, 30 70"/>
      <path d="M30 70 C 20 74, 14 80, 10 88"/>
      <path d="M100 50 C 96 42, 98 34, 106 28"/>
      <line x1="10" y1="88" x2="4" y2="90"/>
    </g></svg>`,
  downdog: `<svg viewBox="0 0 170 110" xmlns="http://www.w3.org/2000/svg">
    <g fill="none" stroke="#EDEFF3" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="132" cy="70" r="8" stroke="#FFB000"/>

      <line x1="36" y1="40" x2="30" y2="46"/>
      <line x1="70" y1="92" x2="72" y2="100"/>
    </g></svg>`
};

const poseSeq = [
  {key:'pranamasana', name:'Pranamasana', label:'Prayer Pose'},
  {key:'hastauttanasana', name:'Hasta Uttanasana', label:'Raised Arms Pose'},
  {key:'padahastasana', name:'Padahastasana', label:'Hand to Foot Pose'},
  {key:'ashwa', name:'Ashwa Sanchalanasana', label:'Equestrian Pose'},
  {key:'ashtanga', name:'Ashtanga Namaskara', label:'Eight-Limbed Pose'},
  {key:'bhujangasana', name:'Bhujangasana', label:'Cobra Pose'},
  {key:'downdog', name:'Adho Mukha Svanasana', label:'Downward Dog'},
  {key:'ashwa', name:'Ashwa Sanchalanasana', label:'Equestrian Pose · Other Leg'},
  {key:'padahastasana', name:'Padahastasana', label:'Hand to Foot Pose'},
  {key:'hastauttanasana', name:'Hasta Uttanasana', label:'Raised Arms Pose'},
  {key:'pranamasana', name:'Pranamasana', label:'Prayer Pose'},
  {key:'pranamasana', name:'Pranamasana', label:'Closing Breath'}
];

/* ============ Environment progression ============ */
const environments = [
  { name:'Night',          top:'#05070C', bottom:'#0B0F17', glow:'rgba(255,176,0,0.00)', horizon:0.00 },
  { name:'Blue Dawn',      top:'#0A1220', bottom:'#131B2C', glow:'rgba(120,150,255,0.10)', horizon:0.10 },
  { name:'Early Sunrise',  top:'#101826', bottom:'#221A1E', glow:'rgba(255,140,90,0.16)', horizon:0.22 },
  { name:'Golden Sunrise', top:'#171623', bottom:'#3A2410', glow:'rgba(255,176,0,0.30)', horizon:0.40 },
  { name:'Mountain Peak',  top:'#111827', bottom:'#4A2C0E', glow:'rgba(255,176,0,0.42)', horizon:0.55 },
  { name:'Morning Light',  top:'#16233A', bottom:'#5C3A12', glow:'rgba(255,200,120,0.55)', horizon:0.70 }
];

const phone = document.getElementById('phone');
const horizonEl = document.getElementById('horizon');
function applyEnvironment(i){
  const e = environments[i];
  phone.style.setProperty('--env-top', e.top);
  phone.style.setProperty('--env-bottom', e.bottom);
  phone.style.setProperty('--env-glow', e.glow);
  horizonEl.style.setProperty('--horizon-opacity', e.horizon);
  horizonEl.style.transform = `translateX(-50%) translateY(${-e.horizon*140}px)`;
  document.getElementById('envName').textContent = e.name;
}
applyEnvironment(0);

/* ============ Ambient particles ============ */
const particleField = document.getElementById('particles');
for(let i=0;i<26;i++){
  const p = document.createElement('div');
  p.className='particle';
  p.style.left = Math.random()*100+'%';
  p.style.bottom = (-20 - Math.random()*100)+'px';
  p.style.setProperty('--dx', (Math.random()*40-20)+'px');
  p.style.animationDuration = (9+Math.random()*10)+'s';
  p.style.animationDelay = (Math.random()*10)+'s';
  p.style.opacity = 0;
  particleField.appendChild(p);
}

/* ============ Session state machine ============ */
const home = document.getElementById('home');
const workout = document.getElementById('workout');
const poseStage = document.getElementById('poseStage');
const ring = document.getElementById('ringProgress');
const RING_LEN = 741.4;

let stepIndex = 0;
let secondsLeft = 4;
let paused = false;
let timer = null;
const STEP_DURATION = 4;

function renderPose(){
  const p = poseSeq[stepIndex];
  poseStage.style.opacity = 0;
  setTimeout(()=>{
    poseStage.innerHTML = poseSVGs[p.key];
    poseStage.style.opacity = 1;
  }, 220);
  document.getElementById('poseName').textContent = p.name;
  document.getElementById('poseStep').textContent = `Step ${stepIndex+1} of ${poseSeq.length} · ${p.label}`;
  document.getElementById('ringSub').textContent = `Round 1 of 3`;

  const pct = Math.round(((stepIndex)/poseSeq.length)*100);
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressPct').textContent = pct+'%';

  // environment advances roughly every 2 steps across 6 stages
  const envIdx = Math.min(environments.length-1, Math.floor(stepIndex/2.2));
  applyEnvironment(envIdx);
}

function tick(){
  if(paused) return;
  secondsLeft -= 1;
  updateRing();
  if(secondsLeft <= 0){
    stepIndex++;
    if(stepIndex >= poseSeq.length){
      finishSession();
      return;
    }
    secondsLeft = STEP_DURATION;
    renderPose();
  }
}

function updateRing(){
  const frac = 1 - (secondsLeft/STEP_DURATION);
  ring.style.strokeDashoffset = RING_LEN * (1-frac);
  document.getElementById('ringTime').textContent = '0:0'+Math.max(secondsLeft,0);
}

function startSession(){
  stepIndex = 0; secondsLeft = STEP_DURATION; paused = false;
  home.classList.remove('active');
  workout.classList.add('active');
  renderPose();
  ring.style.strokeDashoffset = RING_LEN;
  clearInterval(timer);
  timer = setInterval(tick, 1000);
}

function endSession(){
  clearInterval(timer);
  workout.classList.remove('active');
  home.classList.add('active');
  applyEnvironment(0);
}

function finishSession(){
  clearInterval(timer);
  document.getElementById('poseName').textContent = 'Session Complete';
  document.getElementById('poseStep').textContent = 'Energy Score +6 · 9 minutes of stillness';
  document.getElementById('progressFill').style.width='100%';
  document.getElementById('progressPct').textContent='100%';
  applyEnvironment(environments.length-1);
  setTimeout(endSession, 2600);
}

function togglePause(){
  paused = !paused;
  document.getElementById('playIcon').innerHTML = paused
    ? `<path d="M8 5l11 7-11 7V5z" fill="#0B0F17"/>`
    : `<rect x="6" y="5" width="4" height="14" rx="1" fill="#0B0F17"/><rect x="14" y="5" width="4" height="14" rx="1" fill="#0B0F17"/>`;
}

function skipPose(dir){
  stepIndex = Math.min(Math.max(stepIndex+dir, 0), poseSeq.length-1);
  secondsLeft = STEP_DURATION;
  renderPose();
  updateRing();
}
</script>
